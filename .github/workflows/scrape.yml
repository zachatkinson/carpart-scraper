name: Scrape Catalog

on:
  schedule:
    - cron: "0 3 * * *"  # Daily at 3 AM UTC (off-peak)
  workflow_dispatch:
    inputs:
      make:
        description: "Vehicle make (e.g. Honda). Empty = all makes."
        required: false
        type: string
        default: ""
      force_full:
        description: "Force full re-scrape, ignoring cached ETags."
        required: false
        type: boolean
        default: false

concurrency:
  group: scrape-catalog
  cancel-in-progress: false

jobs:
  scrape:
    name: Scrape Catalog
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Install Playwright Chromium
        run: uv run playwright install --with-deps chromium

      - name: Restore checkpoints cache
        uses: actions/cache/restore@v4
        with:
          path: checkpoints/
          key: scrape-checkpoints-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            scrape-checkpoints-${{ github.ref_name }}-
            scrape-checkpoints-

      - name: Scrape
        env:
          CSF_WP_URL: ${{ secrets.CSF_WP_URL }}
          CSF_WP_API_KEY: ${{ secrets.CSF_WP_API_KEY }}
          PYTHONUNBUFFERED: "1"
        run: |
          FORCE_FLAG=""
          if [ "${{ inputs.force_full }}" = "true" ]; then
            FORCE_FLAG="--force-full"
          fi

          MAKE_FLAG=""
          if [ -n "${{ inputs.make }}" ]; then
            MAKE_FLAG="--make ${{ inputs.make }}"
          fi

          uv run carpart scrape \
            $MAKE_FLAG \
            $FORCE_FLAG \
            --resume \
            --time-budget 350 \
            --sync-images \
            --wp-url "$CSF_WP_URL" \
            --wp-api-key "$CSF_WP_API_KEY" \
          || EXIT_CODE=$?

          # Exit code 3 = time budget reached (graceful, checkpoints saved)
          if [ "${EXIT_CODE:-0}" -eq 3 ]; then
            echo "::warning::Time budget reached — will resume on next run"
          elif [ "${EXIT_CODE:-0}" -ne 0 ]; then
            exit "$EXIT_CODE"
          fi

      - name: Save checkpoints cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: checkpoints/
          key: scrape-checkpoints-${{ github.ref_name }}-${{ github.run_id }}

      - name: Upload artifacts on failure or timeout
        if: failure() || cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: debug-scrape
          path: |
            exports/
            checkpoints/
          retention-days: 7
